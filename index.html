<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Web Mẫu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f5f5f5;
            color: #333;
        }
        h1 {
            color: #007BFF;
        }
        .container {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 600px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        img {
            max-width: 100%;
            border-radius: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin-top: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Chào mừng đến với Trang Web Mẫu</h1>
        <p>Đây là một đoạn văn giới thiệu nội dung của trang web. Bạn có thể thêm bất kỳ nội dung nào bạn muốn tại đây.</p>
        <img src="https://via.placeholder.com/600x300" alt="Ảnh mẫu">
        <br>
        <button onclick="alert('Bạn vừa nhấn nút!')">Nhấn vào tôi</button>
    </div>

</body>
</html>
